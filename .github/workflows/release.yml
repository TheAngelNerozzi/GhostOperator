name: "Build and Release GhostOperator"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: "ghost"

jobs:
  build-windows:
    name: Build Windows (AMD64)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build Binary
        run: go build -ldflags "-s -w" -o ghost-windows-amd64.exe ./cmd/ghost

      - name: Sign Binary (Code Signing)
        shell: pwsh
        run: |
          Write-Host "[SIGN] Creating self-signed code signing certificate..." -ForegroundColor Cyan

          # Create self-signed code signing certificate
          $cert = New-SelfSignedCertificate `
              -Type CodeSigningCert `
              -Subject "CN=Angel Nerozzi, O=Angel Nerozzi, C=VE" `
              -HashAlgorithm SHA256 `
              -KeyAlgorithm RSA `
              -KeyLength 4096 `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -NotAfter (Get-Date).AddYears(3) `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")

          Write-Host "  Thumbprint: $($cert.Thumbprint)" -ForegroundColor Gray

          # Export to PFX
          $pfxPath = Join-Path $env:TEMP "ghost-sign.pfx"
          $pfxPass = "ghostoperator2026sign"
          $secPass = ConvertTo-SecureString -String $pfxPass -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $secPass | Out-Null

          # Find signtool
          $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) {
              Write-Host "  ERROR: signtool.exe not found" -ForegroundColor Red
              exit 1
          }

          Write-Host "  signtool: $signtool" -ForegroundColor Gray

          # Sign with SHA256 + timestamp
          & $signtool sign `
              /f $pfxPath `
              /p $pfxPass `
              /tr "http://timestamp.digicert.com" `
              /td SHA256 `
              /fd SHA256 `
              /c "CN=Angel Nerozzi" `
              ghost-windows-amd64.exe

          if ($LASTEXITCODE -ne 0) {
              Write-Host "  Signing failed!" -ForegroundColor Red
              exit 1
          }

          # Verify
          & $signtool verify /pa /all ghost-windows-amd64.exe
          Write-Host "  Signed and verified successfully!" -ForegroundColor Green

          Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-windows-amd64
          path: ghost-windows-amd64.exe

  build-linux:
    name: Build Linux (AMD64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build Binary
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o ghost-linux-amd64 ./cmd/ghost

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-linux-amd64
          path: ghost-linux-amd64

  build-darwin:
    name: Build macOS (AMD64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build Binary
        run: GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o ghost-darwin-amd64 ./cmd/ghost

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-darwin-amd64
          path: ghost-darwin-amd64

  build-darwin-arm:
    name: Build macOS (ARM64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build Binary
        run: GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o ghost-darwin-arm64 ./cmd/ghost

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-darwin-arm64
          path: ghost-darwin-arm64

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-darwin, build-darwin-arm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Files
        run: |
          mkdir -p ./release
          cp ./artifacts/ghost-windows-amd64/ghost-windows-amd64.exe ./release/
          cp ./artifacts/ghost-linux-amd64/ghost-linux-amd64 ./release/
          chmod +x ./release/ghost-linux-amd64
          cp ./artifacts/ghost-darwin-amd64/ghost-darwin-amd64 ./release/
          cp ./artifacts/ghost-darwin-arm64/ghost-darwin-arm64 ./release/

      - name: Generate Changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF_NAME}
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "## What's New in ${TAG}"
            echo ""
            echo "### Security Hardening (v1.3.0+)"
            echo "- SSRF protection hardened with net.IP.IsLoopback() + DNS resolution"
            echo "- Prompt injection prevention via proper quote/backslash escaping"
            echo "- Mission concurrency control with atomic semaphore"
            echo "- HTTP server timeouts (Read/Write/Idle) to prevent Slow Lorris DoS"
            echo "- Body size limit (1MB) on mission endpoint"
            echo "- Cancellable context with signal handler for graceful Ctrl+C"
            echo "- GridDensity upper bound validation (max 50x50)"
            echo ""
            echo "### Code Signing (v1.3.1)"
            echo "- Windows binary signed with SHA256 code signing certificate"
            echo "- Timestamped via DigiCert to ensure signature validity"
            echo "- Proper version metadata embedded (Company, Product, Copyright)"
            echo "- Windows 10/11 compatibility manifest with DPI awareness"
            echo ""
            echo "### UI Redesign (v1.2.0)"
            echo "- Complete minimalist monochrome dark theme (Zinc palette)"
            echo "- Inter + JetBrains Mono typography system"
            echo "- Full i18n: English, Spanish, French, Chinese"
            echo ""
            echo "### Downloads"
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows | ghost-windows-amd64.exe (Signed) |"
            echo "| Linux | ghost-linux-amd64 |"
            echo "| macOS (Intel) | ghost-darwin-amd64 |"
            echo "| macOS (Apple Silicon) | ghost-darwin-arm64 |"
          } > ./CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: "GhostOperator ${{ steps.changelog.outputs.tag }}"
          body_path: ./CHANGELOG.md
          files: ./release/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: "Build and Release GhostOperator (v1)"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Release Windows (AMD64)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Binary
        run: |
          go build -ldflags "-s -w" -o ghost-windows-amd64.exe ./cmd/ghost

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "GhostOperator (Latest Stable)"
          body: "Auto-compiled binary from the latest push. Includes Grid Vision System™ and PhantomPulse™ v1.0.1 improvements."
          files: ghost-windows-amd64.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

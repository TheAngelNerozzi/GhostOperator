# ═══════════════════════════════════════════════════════════════
# Webhook Auto-Update Pipeline
# Triggers on every push to main, builds all binaries,
# generates SHA256 checksums, and publishes a latest.json
# manifest + binaries as a GitHub Release tagged "latest".
# ═══════════════════════════════════════════════════════════════
name: "Auto-Update Webhook"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: "ghost"

jobs:
  # ── Step 1: Build all platform binaries ──
  build-all:
    name: Build All Platforms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Extract Version
        id: version
        run: |
          # Extract version from main.go (format: const version = "X.Y.Z")
          VERSION=$(grep -oP 'const version = "\K[^"]+' cmd/ghost/main.go || echo "0.0.0-unknown")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Build version: ${VERSION} (commit: ${GITHUB_SHA::7})"

      - name: Build Windows AMD64
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o ./release/ghost-windows-amd64.exe ./cmd/ghost

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o ./release/ghost-linux-amd64 ./cmd/ghost

      - name: Build macOS AMD64
        run: GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o ./release/ghost-darwin-amd64 ./cmd/ghost

      - name: Build macOS ARM64
        run: GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o ./release/ghost-darwin-arm64 ./cmd/ghost

      - name: Compute Checksums and Generate Manifest
        id: manifest
        env:
          VER: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          cd ./release

          # Compute checksums and write CHECKSUMS.txt
          echo "## SHA256 Checksums" > ../CHECKSUMS.txt
          echo "" >> ../CHECKSUMS.txt
          for file in *; do
            if [ -f "$file" ]; then
              FILE_SHA=$(sha256sum "$file" | awk '{print $1}')
              FILE_SIZE=$(stat -c%s "$file")
              echo "${FILE_SHA}  ${file}" >> ../CHECKSUMS.txt
              echo "  ${file}: sha256=${FILE_SHA} size=${FILE_SIZE}"
            fi
          done
          echo ""
          cat ../CHECKSUMS.txt

          # Generate latest.json using Python (robust, no sed/heredoc issues)
          python3 << 'PYEOF'
          import json, os, hashlib, time

          ver = os.environ["VER"]
          sha = os.environ["SHA"]
          now = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          assets = {}
          release_dir = "."
          for fname in sorted(os.listdir(release_dir)):
              fpath = os.path.join(release_dir, fname)
              if not os.path.isfile(fpath):
                  continue
              # Compute SHA256
              h = hashlib.sha256()
              with open(fpath, "rb") as f:
                  for chunk in iter(lambda: f.read(8192), b""):
                      h.update(chunk)
              file_sha = h.hexdigest()
              file_size = os.path.getsize(fpath)

              # Map filename to platform identifier
              platform_map = {
                  "ghost-windows-amd64.exe": "windows-amd64",
                  "ghost-linux-amd64": "linux-amd64",
                  "ghost-darwin-amd64": "darwin-amd64",
                  "ghost-darwin-arm64": "darwin-arm64",
              }
              platform = platform_map.get(fname, fname)
              download_url = f"https://github.com/TheAngelNerozzi/GhostOperator/releases/download/latest/{fname}"

              assets[fname] = {
                  "url": download_url,
                  "sha256": file_sha,
                  "size": file_size,
                  "platform": platform,
              }

          manifest = {
              "version": ver,
              "commit": sha,
              "build_time": now,
              "channel": "stable",
              "published_at": now,
              "min_version": "1.4.0",
              "mandatory": False,
              "changelog": "Auto-update from main branch build",
              "assets": assets,
          }

          with open("latest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print("=== Generated latest.json ===")
          print(json.dumps(manifest, indent=2))
          print("")
          print(f"Assets: {len(assets)} binaries")
          for name, info in assets.items():
              print(f"  {name}: {info['size']} bytes, sha256={info['sha256'][:16]}...")
          PYEOF

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: ./release/*

  # ── Step 2: Publish as GitHub Release ──
  publish-latest:
    name: Publish Latest Release
    needs: build-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: ./release

      - name: Delete Existing "latest" Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the existing "latest" release and tag if they exist
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          echo "Existing 'latest' release cleaned up."

      - name: Create "latest" Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract version from manifest
          VERSION=$(python3 -c "import json; print(json.load(open('./release/latest.json'))['version'])")
          COMMIT=$(python3 -c "import json; print(json.load(open('./release/latest.json'))['commit'])")
          BUILD_TIME=$(python3 -c "import json; print(json.load(open('./release/latest.json'))['build_time'])")

          # Create tag and release
          git tag -f latest
          git push -f origin latest

          gh release create latest \
            --title "GhostOperator v${VERSION} (build ${COMMIT})" \
            --notes "Auto-generated build from main branch.

          - **Version**: ${VERSION}
          - **Commit**: ${COMMIT}
          - **Build Time**: ${BUILD_TIME}
          - **Channel**: stable

          This is a rolling release. It is automatically updated on every push to main." \
            --prerelease \
            ./release/*

          echo "=== Release 'latest' published successfully ==="

      - name: Verify Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Verifying published release ==="
          gh release view latest --json tagName,name,assets --jq '{tag: .tagName, name: .name, assets: [.assets[].name]}'
          echo ""
          echo "=== Verifying latest.json is downloadable ==="
          curl -sL https://github.com/TheAngelNerozzi/GhostOperator/releases/download/latest/latest.json | python3 -m json.tool | head -5
          echo "..."
          echo "=== Webhook pipeline complete ==="
